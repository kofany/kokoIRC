<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="kokoIRC — A modern terminal IRC client built with OpenTUI, React, and Bun. Scripting, theming, encrypted logging, and more.">
  <meta name="keywords" content="irc, terminal, tui, client, chat, kokoirc, opentui, bun, react">
  <meta name="author" content="kofany">
  <meta property="og:title" content="{{title}} — kokoIRC">
  <meta property="og:description" content="A modern terminal IRC client built with OpenTUI, React, and Bun. Inspired by irssi, designed for the future.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://kofany.github.io/kokoIRC/">
  <meta property="og:image" content="https://kofany.github.io/kokoIRC/images/chat.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{title}} — kokoIRC">
  <meta name="twitter:description" content="A modern terminal IRC client built with OpenTUI, React, and Bun.">
  <meta name="twitter:image" content="https://kofany.github.io/kokoIRC/images/chat.png">
  <title>{{title}} — kokoIRC</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Mobile hamburger toggle -->
  <button class="hamburger" aria-label="Toggle navigation">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <div class="page-wrapper">
    <!-- Sidebar navigation -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <a href="index.html" class="brand">kokoIRC</a>
        <span class="brand-tagline">Documentation</span>
      </div>
      <nav class="sidebar-nav">
        {{nav}}
      </nav>
      <div class="sidebar-footer">
        Built with <a href="https://bun.sh">Bun</a>
        &middot;
        <a href="https://github.com/kofany/kokoIRC">GitHub</a>
      </div>
    </aside>

    <!-- Overlay for mobile sidebar -->
    <div class="sidebar-overlay"></div>

    <!-- Main content -->
    <div class="content-wrapper">
      <main class="content">
        {{content}}

        <!-- Prev / Next navigation -->
        <nav class="page-nav">
          {{prev}}
          {{next}}
        </nav>

        <footer class="site-footer">
          Built with <a href="https://bun.sh">Bun</a> &middot;
          <a href="https://github.com/kofany/kokoIRC">GitHub</a> &middot;
          MIT License
        </footer>
      </main>
    </div>
  </div>

  <script>
    // Mobile sidebar toggle
    (function() {
      const hamburger = document.querySelector('.hamburger');
      const sidebar = document.querySelector('.sidebar');
      const overlay = document.querySelector('.sidebar-overlay');

      function toggleSidebar() {
        hamburger.classList.toggle('active');
        sidebar.classList.toggle('open');
        overlay.classList.toggle('visible');
        document.body.style.overflow = sidebar.classList.contains('open') ? 'hidden' : '';
      }

      function closeSidebar() {
        hamburger.classList.remove('active');
        sidebar.classList.remove('open');
        overlay.classList.remove('visible');
        document.body.style.overflow = '';
      }

      hamburger.addEventListener('click', toggleSidebar);
      overlay.addEventListener('click', closeSidebar);

      // Close sidebar on Escape key
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && sidebar.classList.contains('open')) {
          closeSidebar();
        }
      });
    })();
  </script>
</body>
</html>
