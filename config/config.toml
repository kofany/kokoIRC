[general]
nick = "kofany`"
username = "kofany"
realname = "OpenTUI IRC"
theme = "default"
timestamp_format = "%H:%M:%S"

[display]
nick_column_width = 8
nick_max_length = 8
nick_alignment = "right"
nick_truncation = true
show_timestamps = true
scrollback_lines = 2000

[sidepanel.left]
width = 20
visible = true

[sidepanel.right]
width = 18
visible = true

[statusbar]
enabled = true
items = ["active_windows", "nick_info", "channel_info", "lag"]
separator = " | "

# Colors — leave empty "" to inherit from theme
# background = "#16161e"
# accent_color = "#7aa2f7"
# text_color = "#a9b1d6"
# muted_color = "#565f89"
# dim_color = "#292e42"

# Input line
prompt = "[$channel]❱"
# prompt_color = "#7aa2f7"
# input_color = "#c0caf5"
# cursor_color = "#7aa2f7"

[servers.ircnet]
label = "IRCnet"
address = "sasl.irc.atw.hu"
port = 6697
tls = true
autoconnect = true
channels = ["#xxx", "#tahio"]
